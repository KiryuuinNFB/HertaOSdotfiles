<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans Thai Looped</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif Thai Looped</family>
    </prefer>
  </alias>


  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono Nerd Font</family>
    </prefer>
  </alias>

  <match>
    <test name="lang">
      <string>th</string>
    </test>

    <edit name="family" mode="prepend">
      <string>Noto Serif Thai Looped</string>
    </edit>
  </match>

</fontconfig>